name: Bug report
description: Report a reproducible bug in the ac plugin.
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you observed.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Run `/ac:plan` with ...
        2. Answer the interview question ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: cc-version
    attributes:
      label: Claude Code version
      description: Run `claude --version` and paste the output.
      placeholder: "e.g. 1.2.3"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Bun version (if relevant), and any other context.
      placeholder: |
        OS: macOS 14
        Node: 22.x
        Bun: 1.2.x
    validations:
      required: false
