name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd cli/ac && bun install --frozen-lockfile

      - name: Typecheck
        run: cd cli/ac && bun run typecheck

      - name: Test
        run: cd cli/ac && bun test
